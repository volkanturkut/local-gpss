name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-x64
            output: linux64
          - os: ubuntu-latest
            arch: linux-arm64
            output: linux-arm64
          - os: macos-latest
            arch: osx-x64
            output: osx64
          - os: windows-2025-vs2026
            arch: win-x64
            output: win64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build GpssConsole ${{ matrix.arch }}
        shell: bash
        run: |
          cd GpssConsole && dotnet publish -c Release -o ./output/${{ matrix.output }} --self-contained true \
            -p:PublishReadyToRun=true -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -r ${{ matrix.arch }}

      - name: Set execute permissions (Linux/macOS)
        if: runner.os != 'Windows'
        run: cd GpssConsole && chmod +x ./output/${{ matrix.output }}/GpssConsole

      - name: Build Local GPSS Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go build \
          -ldflags '-d -s -w -extldflags=-static' \
          -tags=netgo,osusergo,static_build \
          -installsuffix netgo \
          -buildvcs=false \
          -trimpath

      - name: Build Local GPSS Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          go build \
          -ldflags '-s -w -extldflags=-static' \
          -tags=netgo,osusergo,static_build \
          -installsuffix netgo \
          -buildvcs=false \
          -trimpath

      - name: Build Local GPSS (Mac OS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          go build \
          -tags=netgo,osusergo,static_build \
          -installsuffix netgo \
          -buildvcs=false \
          -trimpath

      - name: Copy GpssConsole to the bin folder
        shell: bash
        run: |
          mkdir bin && cp GpssConsole/output/${{ matrix.output }}/* ./bin/

      - name: Create ZIP archive
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip ./${{ matrix.output }}.zip local-gpss.exe bin/*
          else
            zip -r ./${{ matrix.output }}.zip local-gpss bin/*
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts 

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: "Automated Release Pipeline Triggered."
          draft: false
          prerelease: false

  deploy:
    name: Deploy to GCP
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 35.211.220.234
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          script: |
            APP_DIR="/home/volkan_trkt"
            
            cd $APP_DIR
            
            # Stop the service to prevent "Text file busy" errors
            sudo systemctl stop local-gpss
            
            # Download the direct artifact from the latest automated tag
            wget -qO linux64.zip https://github.com/volkanturkut/local-gpss/releases/download/${{ github.ref_name }}/linux64.zip
            
            # Unzip over existing files
            unzip -o linux64.zip
            
            # Re-apply executable permissions
            chmod +x local-gpss
            
            # Start the service back up
            sudo systemctl start local-gpss
            
            # Clean up artifact
            rm linux64.zip
